<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahil Hasnain - Islamic Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a0f;font-family:'Inter',sans-serif;display:flex;justify-content:center;padding:40px 20px}
.container{max-width:480px;width:100%}
.profile{text-align:center;margin-bottom:40px}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px}
.name{font-size:24px;font-weight:700;color:#fff}
.bio{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px}
.links{display:flex;flex-direction:column;gap:14px}
.link{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px 20px;text-decoration:none;transition:all .2s}
.link:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,215,0,0.3);transform:translateY(-2px)}
.link-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#1a1a2e,#2a2a4e);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.link-text{flex:1}
.link-title{font-size:16px;font-weight:600;color:#fff}
.link-desc{font-size:13px;color:rgba(255,255,255,0.45);margin-top:3px}
.link-arrow{color:rgba(255,255,255,0.3);font-size:20px}
.footer{text-align:center;margin-top:48px;font-size:12px;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="container">
  <div class="profile">
    <div class="avatar">🕌</div>
    <div class="name">Sahil Hasnain</div>
    <div class="bio">Islamic Apps for the Ummah</div>
  </div>

  <div class="links">
    <a class="link" href="https://play.google.com/store/apps/details?id=com.duroodepak" target="_blank">
      <div class="link-icon">📿</div>
      <div class="link-text">
        <div class="link-title">Durood Time</div>
        <div class="link-desc">1 Crore Durood Planner & Dalailul Khairat</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

    <!-- Add your other apps below -->
  </div>

  <div class="footer">Made with ❤️ for the Ummah</div>
</div>
</body>
</html>
