<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahil Hasnain Qadri</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DLCJ4NCWY1"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-DLCJ4NCWY1');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#06060a;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow-x:hidden}
.noise{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.orb-1{width:400px;height:400px;background:rgba(255,215,0,0.06);top:-100px;right:-100px;animation:float 20s ease-in-out infinite}
.orb-2{width:350px;height:350px;background:rgba(139,92,246,0.05);bottom:-50px;left:-100px;animation:float 25s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.container{max-width:420px;width:100%;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:48px;animation:fadeUp .8s ease}
.avatar{width:110px;height:110px;border-radius:28px;background:linear-gradient(135deg,#FFD700 0%,#FF8C00 100%);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:42px;font-weight:800;color:#06060a;box-shadow:0 20px 60px rgba(255,215,0,0.2),0 0 0 1px rgba(255,215,0,0.1);transition:transform .3s}
.avatar:hover{transform:scale(1.05) rotate(-2deg)}
.name{font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-0.5px}
.bio{font-size:15px;color:rgba(255,255,255,0.4);font-weight:500}
.links{display:flex;flex-direction:column;gap:12px;margin-bottom:40px}
.link{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:20px 24px;text-decoration:none;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;animation:fadeUp .8s ease backwards}
.link:nth-child(1){animation-delay:.1s}
.link:nth-child(2){animation-delay:.2s}
.link::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,0.08),transparent);opacity:0;transition:opacity .3s}
.link:hover{border-color:rgba(255,215,0,0.3);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.link:hover::before{opacity:1}
.icon-box{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;position:relative;z-index:1}
.icon-box.gold{background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,165,0,0.08))}
.link-text{flex:1;position:relative;z-index:1}
.link-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.link-desc{font-size:13px;color:rgba(255,255,255,0.35);font-weight:500}
.arrow{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:14px;flex-shrink:0;transition:all .3s;position:relative;z-index:1}
.link:hover .arrow{background:rgba(255,215,0,0.15);color:#FFD700;transform:translateX(4px)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.15);border-radius:100px;font-size:12px;font-weight:600;color:#FFD700;margin-top:8px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#FFD700;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.footer{text-align:center;font-size:12px;color:rgba(255,255,255,0.15);font-weight:500;animation:fadeUp .8s ease backwards;animation-delay:.4s}
.footer span{color:rgba(255,215,0,0.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="container">
  <div class="hero">
    <div class="avatar">SH</div>
    <div class="name">Sahil Hasnain Qadri</div>
    <div class="bio">Developer &bull; Translator &bull; Serving the Ummah</div>
  </div>
  <div class="links">
    <a class="link" href="books.html">
      <div class="icon-box gold">&#x1F4D6;</div>
      <div class="link-text">
        <div class="link-title">Translated Books</div>
        <div class="link-desc">Classical Islamic works in English</div>
        <div class="badge"><div class="badge-dot"></div> 4 Books Available</div>
      </div>
      <div class="arrow">&rarr;</div>
    </a>
    <a class="link" href="apps.html">
      <div class="icon-box gold">&#x1F4F1;</div>
      <div class="link-text">
        <div class="link-title">Islamic Apps</div>
        <div class="link-desc">Free apps for the Ummah</div>
        <div class="badge"><div class="badge-dot"></div> 6 Apps on Play Store</div>
      </div>
      <div class="arrow">&rarr;</div>
    </a>
  </div>
  <div class="footer">Made with <span>&hearts;</span> for the Ummah</div>
</div>
</body>
</html>
